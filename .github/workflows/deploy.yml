name: Deploy MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Deploy to production server
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            set -e
            DEPLOY_DIR="/opt/25vid/mcp"
            LOG_FILE="/opt/mcp/logs/deploy.log"
            TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            echo "[$TIMESTAMP] Deploy started (triggered by GitHub Actions)" >> "$LOG_FILE"

            cd "$DEPLOY_DIR"

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main
            echo "[$TIMESTAMP] Git pull completed" >> "$LOG_FILE"

            # Rebuild and restart containers
            docker compose build --no-cache
            docker compose up -d
            echo "[$TIMESTAMP] Docker rebuild and restart completed" >> "$LOG_FILE"

            # Wait for health check
            sleep 10
            if curl -sf http://127.0.0.1:8787/health > /dev/null; then
              echo "[$TIMESTAMP] Deploy SUCCESS — health check passed" >> "$LOG_FILE"
            else
              echo "[$TIMESTAMP] Deploy WARNING — health check failed" >> "$LOG_FILE"
              exit 1
            fi

            echo "[$TIMESTAMP] Deploy completed successfully" >> "$LOG_FILE"
