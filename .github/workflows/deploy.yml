name: Deploy MCP Server

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deployments — only one deploy at a time
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Validate deploy secrets
        run: |
          missing=""
          if [ -z "${{ secrets.DEPLOY_HOST }}" ]; then missing="$missing DEPLOY_HOST"; fi
          if [ -z "${{ secrets.DEPLOY_USER }}" ]; then missing="$missing DEPLOY_USER"; fi
          if [ -z "${{ secrets.DEPLOY_SSH_KEY }}" ]; then missing="$missing DEPLOY_SSH_KEY"; fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required deployment secrets:$missing"
            echo "Configure these in Settings > Secrets and variables > Actions (environment: production)"
            exit 1
          fi

      - name: Deploy to production server
        # Pinned ssh-action version for reproducibility and supply-chain safety.
        # To update: review release notes at https://github.com/appleboy/ssh-action,
        # test locally or in a non-production environment, then bump this tag.
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          command_timeout: 10m
          script: |
            set -e
            DEPLOY_DIR="${{ secrets.DEPLOY_DIR || '/opt/mcp-real' }}"
            LOG_DIR="/opt/mcp/logs"
            mkdir -p "$LOG_DIR"
            LOG_FILE="$LOG_DIR/deploy.log"
            COMMIT="${{ github.sha }}"

            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Deploy started (commit: $COMMIT, triggered by GitHub Actions)" >> "$LOG_FILE"

            cd "$DEPLOY_DIR"

            # Pull latest changes
            git fetch origin main
            git reset --hard origin/main
            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Git pull completed ($(git rev-parse --short HEAD))" >> "$LOG_FILE"

            # Rebuild and force-recreate containers to ensure latest code is running
            docker compose build --no-cache
            docker compose up -d --force-recreate --remove-orphans
            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Docker rebuild and restart completed" >> "$LOG_FILE"

            # Docker-native health validation
            # Wait for both containers to report "healthy" via Docker healthchecks
            MAX_WAIT=90
            POLL_INTERVAL=5
            ELAPSED=0
            MCP_HEALTHY=false
            ADMIN_HEALTHY=false

            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Waiting for containers to become healthy (timeout: ${MAX_WAIT}s)..." >> "$LOG_FILE"

            while [ "$ELAPSED" -lt "$MAX_WAIT" ]; do
              MCP_STATUS=$(docker inspect --format='{{.State.Health.Status}}' mcp-server 2>/dev/null || echo "unknown")
              ADMIN_STATUS=$(docker inspect --format='{{.State.Health.Status}}' mcp-admin-server 2>/dev/null || echo "unknown")

              if [ "$MCP_STATUS" = "healthy" ]; then
                MCP_HEALTHY=true
              fi
              if [ "$ADMIN_STATUS" = "healthy" ]; then
                ADMIN_HEALTHY=true
              fi

              if [ "$MCP_HEALTHY" = true ] && [ "$ADMIN_HEALTHY" = true ]; then
                echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Both containers healthy after ${ELAPSED}s" >> "$LOG_FILE"
                break
              fi

              sleep "$POLL_INTERVAL"
              ELAPSED=$((ELAPSED + POLL_INTERVAL))
            done

            # Evaluate final health status
            if [ "$MCP_HEALTHY" = false ] || [ "$ADMIN_HEALTHY" = false ]; then
              echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Deploy FAILED — health status: mcp-server=$MCP_STATUS mcp-admin-server=$ADMIN_STATUS (after ${ELAPSED}s)" >> "$LOG_FILE"

              echo "=== DEPLOYMENT HEALTH CHECK FAILURE ===" | tee -a "$LOG_FILE"
              if [ "$MCP_HEALTHY" = false ]; then
                echo "FAILED: mcp-server (status: $MCP_STATUS)" | tee -a "$LOG_FILE"
              fi
              if [ "$ADMIN_HEALTHY" = false ]; then
                echo "FAILED: mcp-admin-server (status: $ADMIN_STATUS)" | tee -a "$LOG_FILE"
              fi

              echo "--- Container status ---" | tee -a "$LOG_FILE"
              docker compose ps 2>&1 | tee -a "$LOG_FILE" || true
              echo "--- MCP server logs (last 50 lines) ---" | tee -a "$LOG_FILE"
              docker compose logs --tail=50 mcp 2>&1 | tee -a "$LOG_FILE" || true
              echo "--- Admin server logs (last 50 lines) ---" | tee -a "$LOG_FILE"
              docker compose logs --tail=50 mcp-admin 2>&1 | tee -a "$LOG_FILE" || true
              exit 1
            fi

            # Clean up old Docker images to prevent disk bloat
            docker image prune -f > /dev/null 2>&1 || true

            echo "[$(date -u +"%Y-%m-%dT%H:%M:%SZ")] Deploy SUCCESS — both services healthy" >> "$LOG_FILE"
