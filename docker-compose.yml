services:
  mcp:
    build: .
    container_name: mcp-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8787:8787"
    volumes:
      - /opt/25vid:/workspace
      - mcp-logs:/opt/mcp/logs
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MCP_WORKSPACE=/workspace
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8787/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  mcp-admin:
    build: .
    container_name: mcp-admin-server
    restart: unless-stopped
    ports:
      - "127.0.0.1:8788:8788"
    volumes:
      - /opt/25vid:/workspace
      - mcp-logs:/opt/mcp/logs
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MCP_WORKSPACE=/workspace
      - MCP_ADMIN_TOKEN
      - MCP_ADMIN_PORT=8788
      - HEALTHCHECK_PORT=8788
    command: ["node", "-e", "require('./src/admin/server').startAdmin()"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8788/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  mcp-logs:
